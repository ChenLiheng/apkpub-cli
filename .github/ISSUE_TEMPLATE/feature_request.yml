name: 功能建议
description: 为本项目提出新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 这个功能要解决什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望实现的效果
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他做法
  - type: textarea
    id: context
    attributes:
      label: 补充说明
