name: 缺陷报告
description: 报告一个问题以帮助我们改进
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢提交缺陷报告！请勿在此粘贴任何密钥或敏感凭证。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述遇到的问题
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 触发该问题的命令与步骤
      placeholder: |
        1. 执行 `apkpub publish ...`
        2. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: apkpub-cli 版本
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js 版本
      placeholder: "20.x"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "macOS 14 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 粘贴日志前请确认已移除密钥等敏感信息
      render: shell
